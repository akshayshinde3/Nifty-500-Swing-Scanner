<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nifty 500 Swing Scanner - Secure Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a0f;
    --card: rgba(15, 24, 34, 0.65);
    --border: rgba(29, 46, 61, 0.8);
    --text: #f0f4f8;
    --muted: #728ca3;
    --blue: #45a2ff;
    --blue-hover: #338ee6;
    --red: #ff5c5c;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg);
    background-image: 
      radial-gradient(at 10% 20%, rgba(69, 162, 255, 0.08) 0px, transparent 50%),
      radial-gradient(at 90% 80%, rgba(60, 208, 112, 0.05) 0px, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .login-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    transform: scale(0.95);
    opacity: 0;
    animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeInScale {
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo {
    font-size: 40px;
    margin-bottom: 12px;
    display: inline-block;
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffffff, #c7d5e6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.5;
  }

  .form-group {
    margin-bottom: 22px;
    position: relative;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .password-input {
    width: 100%;
    background: rgba(20, 34, 48, 0.5);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  .password-input:focus {
    outline: none;
    border-color: var(--blue);
    background: rgba(20, 34, 48, 0.8);
    box-shadow: 0 0 0 3px rgba(69, 162, 255, 0.15);
  }

  .error-box {
    background: rgba(255, 92, 92, 0.08);
    border: 1px solid rgba(255, 92, 92, 0.25);
    color: var(--red);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: shake 0.3s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--blue) 0%, #1e80e6 100%);
    border: none;
    border-radius: 10px;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(69, 162, 255, 0.2);
  }

  .login-btn:hover {
    background: linear-gradient(135deg, #5eb2ff 0%, var(--blue) 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(69, 162, 255, 0.3);
  }

  .login-btn:active {
    transform: translateY(1px);
  }

  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 11.5px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="header">
    <span class="logo">📈</span>
    <h2>Nifty Swing Scanner</h2>
    <p class="subtitle">Access is restricted. Please enter the website security password to continue.</p>
  </div>

  {% if error %}
  <div class="error-box">
    <span>⚠️</span>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="password">Security Password</label>
      <input type="password" id="password" name="password" class="password-input" placeholder="••••••••" required autofocus autocomplete="current-password">
    </div>

    <button type="submit" class="login-btn">Unlock Scanner</button>
  </form>

  <div class="footer">
    <p>© 2026 Nifty Swing Scanner • Secure Session</p>
  </div>
</div>

</body>
</html>
